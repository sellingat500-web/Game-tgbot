<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub TopUp Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navigation Header -->
    <header class="navbar">
        <div class="logo">
            <i class="fas fa-gamepad"></i>
            <span>GAMEHUB</span>
        </div>
        <div class="theme-picker">
            <label for="themeSelect"><i class="fas fa-palette"></i> Color:</label>
            <select id="themeSelect" onchange="changeTheme(this.value)">
                <option value="blue">Cyber Blue</option>
                <option value="purple">Neon Purple</option>
                <option value="green">Emerald Green</option>
                <option value="dark">Midnight Dark</option>
            </select>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container">

        <!-- Step 1: Player Verification -->
        <section class="card">
            <div class="card-header">
                <span class="step-badge">1</span>
                <h3>Enter Player Info</h3>
            </div>
            <div class="input-group">
                <input type="text" id="playerUid" placeholder="Enter Player UID (e.g., 100200300)">
                <button class="btn btn-primary" onclick="verifyPlayer()">Verify</button>
            </div>
            <div id="playerDetails" class="player-details" style="display: none;">
                <p><strong>Nickname:</strong> <span id="playerName">-</span></p>
                <p><strong>UID:</strong> <span id="displayUid">-</span></p>
                <p class="status-verified"><i class="fas fa-check-circle"></i> Account Verified</p>
            </div>
        </section>

        <!-- Step 2: Choose Package -->
        <section class="card">
            <div class="card-header">
                <span class="step-badge">2</span>
                <h3>Select Item Package</h3>
            </div>
            <div class="package-grid">
                <div class="package-card" onclick="selectPkg(100, 80, this)">
                    <div class="pkg-icon"><i class="fas fa-gem"></i></div>
                    <div class="pkg-title">100 Gems</div>
                    <div class="pkg-price">₹80</div>
                </div>
                <div class="package-card" onclick="selectPkg(310, 240, this)">
                    <div class="pkg-icon"><i class="fas fa-gem"></i></div>
                    <div class="pkg-title">310 Gems</div>
                    <div class="pkg-price">₹240</div>
                </div>
                <div class="package-card" onclick="selectPkg(520, 400, this)">
                    <div class="pkg-icon"><i class="fas fa-gem"></i></div>
                    <div class="pkg-title">520 Gems</div>
                    <div class="pkg-price">₹400</div>
                </div>
                <div class="package-card" onclick="selectPkg(1060, 800, this)">
                    <div class="pkg-icon"><i class="fas fa-gem"></i></div>
                    <div class="pkg-title">1060 Gems</div>
                    <div class="pkg-price">₹800</div>
                </div>
            </div>
        </section>

        <!-- Step 3: Checkout Summary -->
        <section class="card">
            <div class="card-header">
                <span class="step-badge">3</span>
                <h3>Order Summary</h3>
            </div>
            <div class="summary-details">
                <div class="summary-row">
                    <span>Selected Package:</span>
                    <span id="selectedItemText" class="highlight-text">None</span>
                </div>
                <div class="summary-row">
                    <span>Total Amount:</span>
                    <span id="selectedPriceText" class="highlight-price">₹0</span>
                </div>
            </div>
            <button class="btn btn-success pay-btn" onclick="submitOrder()">Proceed to Payment</button>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
