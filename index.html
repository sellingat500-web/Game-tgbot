<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Gaming Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Icons ke liye -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Top Header: Profile & Balance -->
    <header class="top-bar">
        <div class="profile-section">
            <img id="user-photo" src="https://via.placeholder.com/50" alt="Profile">
            <div class="user-info">
                <h3 id="user-name">Loading...</h3>
                <p class="balance">💰 <span id="user-balance">0</span> Coins</p>
            </div>
        </div>
    </header>

    <!-- Rewards Section (Daily Bonus & Refer) -->
    <section class="rewards-box">
        <button id="daily-btn" class="btn reward-btn" onclick="claimDailyBonus()">
            <i class="fas fa-gift"></i> Daily Bonus
        </button>
        <button class="btn refer-btn" onclick="openReferral()">
            <i class="fas fa-users"></i> Refer & Earn (1%)
        </button>
    </section>

    <!-- Games List -->
    <section class="games-container">
        <h2>🔥 Trending Games</h2>
        <div class="games-grid">
            
            <div class="game-card" onclick="playGame('Aviator', 10)">
                <div class="game-icon">🚀</div>
                <div class="game-title">Aviator</div>
            </div>

            <div class="game-card" onclick="playGame('Chicken Road', 10)">
                <div class="game-icon">🐔</div>
                <div class="game-title">Chicken Road</div>
            </div>

            <div class="game-card" onclick="playGame('777 Slot', 10)">
                <div class="game-icon">🎰</div>
                <div class="game-title">777 Slot</div>
            </div>

            <div class="game-card" onclick="playGame('Flip', 10)">
                <div class="game-icon">🪙</div>
                <div class="game-title">Coin Flip</div>
            </div>

            <div class="game-card" onclick="playGame('Mines', 10)">
                <div class="game-icon">💣</div>
                <div class="game-title">Mines 3x3</div>
            </div>

        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
